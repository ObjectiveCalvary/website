<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anchor Main Menu</title>
<link rel="icon" href="../images/OC_64px.png" sizes="48x48">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { width: 100%; height: 100%; overflow-x: hidden; }

  body {
    min-height: 100vh;
    font-family: 'Nunito', sans-serif;
    background: #e4decb;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* ── Canvas background ── */
  #bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* ── Soft centre glow so text stays legible ── */
  .overlay {
    position: fixed;
    inset: 0;
    z-index: 1;
    background: radial-gradient(ellipse at 50% 44%,
      rgba(245,240,232,0.80) 0%,
      rgba(245,240,232,0.50) 48%,
      rgba(245,240,232,0.08) 100%
    );
    pointer-events: none;
  }

  /* ── Page ── */
  .page {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 580px;
    padding: 2.8rem 1.6rem 3.2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ══════════════ LOGO ══════════════ */
  .logo-container {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 0.8rem;
    animation: fade-down 0.85s ease both;
  }

  /* Orbiting accent dots — smaller, refined */
  .sparkle {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    animation: sparkle-glow 2.8s ease-in-out infinite;
  }
  .sp1 { width:9px;  height:9px;  background:#d6b027; top:-4px;   right:10px;  animation-delay:0s;    }
  .sp2 { width:7px;  height:7px;  background:#258fa2; top:14px;   left:-8px;   animation-delay:0.55s; }
  .sp3 { width:8px;  height:8px;  background:#858bd8; bottom:6px; right:-6px;  animation-delay:1.1s;  }
  .sp4 { width:6px;  height:6px;  background:#70af81; bottom:20px;left:-2px;   animation-delay:1.65s; }

  @keyframes sparkle-glow {
    0%,100%{ transform:scale(1);    opacity:0.55; }
    50%     { transform:scale(1.65); opacity:1;    }
  }

  /* Logo ring */
  .logo-ring {
    width: 248px;
    height: 248px;
    
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    animation: float-bob 4.2s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes float-bob {
    0%,100%{ transform:translateY(0);    }
    50%     { transform:translateY(-9px); }
  }

  .logo-ring img {
    width: 218px;
    height: 218px;
    object-fit: contain;
    display: block;
  }

  .logo-fallback {
    display: none;
    width: 118px;
    height: 118px;
    border-radius: 50%;
    background: linear-gradient(135deg, #f8d06c 0%, #d6b027 100%);
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    color: rgba(255,255,255,0.9);
  }

  /* ══════════════ TITLE ══════════════ */
  h1.title {
    font-family: Arial, Helvetica, sans-serif;
    color: #ffbd59;
    font-size: 64px;
    margin-bottom: 12px;
    font-weight: 700;
  }

  .subtitle {
    font-family: 'Nunito', sans-serif;
    font-size: clamp(0.7rem, 2vw, 0.85rem);
    font-weight: 800;
    color: #616161;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    text-align: center;
    margin-top: 0.35rem;
    animation: fade-down 0.9s 0.2s ease both;
  }

  /* ══════════════ DIVIDER ══════════════ */
  .divider {
    width: 100%;
    max-width: 360px;
    margin: 1.1rem 0 0.9rem;
    display: flex;
    align-items: center;
    gap: 10px;
    animation: fade-in 1s 0.32s ease both;
  }
  .div-line {
    flex: 1;
    height: 1.5px;
    border-radius: 99px;
    background: linear-gradient(to right,
      transparent, #d6b027 30%, #ed9e71 60%, #ffbd59, transparent
    );
    opacity: 0.65;
  }
  .div-diamond {
    width: 8px; height: 8px;
    background: #ffbd59;
    transform: rotate(45deg);
    flex-shrink: 0;
    box-shadow: 0 0 6px rgba(214,176,39,0.55);
    animation: float-bob 3.5s ease-in-out infinite;
  }

  /* ══════════════ QUOTE ══════════════ */
  .quote-card {
    margin: 0 0 2.2rem;
    max-width: 420px;
    background: rgba(255,255,255,0.72);
    border: 1.5px solid rgba(214,176,39,0.35);
    border-radius: 14px;
    padding: 1.15rem 1.6rem 1.05rem;
    box-shadow: 0 4px 24px rgba(214,176,39,0.10), 0 1px 4px rgba(0,0,0,0.05);
    text-align: center;
    animation: fade-in 1s 0.44s ease both;
  }

  .quote-text {
    font-family: Arial, Helvetica, sans-serif;
    font-size: clamp(0.95rem, 2.7vw, 1.08rem);
    font-weight:400;
    color: #797979;
    font-style: italic;
    line-height: 1.75;
    margin-bottom: 20px;
  }

  .quote-ref {
    margin-top: 0.55rem;
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    color: #258fa2;
    text-transform: uppercase;
    font-weight: 800;
  }

  /* ══════════════ BUTTONS ══════════════ */
  .btn-group {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    width: 100%;
    max-width: 380px;
  }

  .menu-btn {
    position: relative;
    width: 100%;
    background-color: #ffbd59d8;
    padding: 1.1rem 1.6rem;
    border-width: 3px;
    border-color: #ffbd59;
    border-radius: 7px;
    cursor: pointer;
    text-shadow: 2px 2px 4px #00000028;
    font-family:Arial, Helvetica, sans-serif; 
    font-size: 28px;
    
    font-weight:bolder ;
    letter-spacing: 0.06em;
    text-align: center;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    border-style: solid;
  }

  /* 3-D depth shadow strip */
  .menu-btn::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 5px;
    border-radius: 0 0 14px 14px;
    transition: height 0.14s;
    pointer-events: none;
  }

  /* Shimmer sweep */
  .menu-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -90%;
    width: 55%; height: 100%;
    transition: left 0.5s ease;
    pointer-events: none;
    z-index: 1;
  }
  .menu-btn:hover::before { left: 150%; }
  .menu-btn:hover  { transform: translateY(-5px) scale(1.02); }
  .menu-btn:active { transform: translateY(1px) scale(0.975); }
  .menu-btn:active::after { height: 2px; }

  .btn-icon  { font-size: 1.2em; position: relative; z-index: 2; flex-shrink: 0; }
  .btn-label { position: relative; z-index: 2; }




  /* ══════════════ FOOTER ══════════════ */
  .footer {
    margin-top: 2.2rem;
    font-size: 0.68rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(75,60,45,0.3);
    text-align: center;
    animation: fade-in 1s 1.1s ease both;
  }

  /* ══════════════ ENTRANCE ANIMATIONS ══════════════ */
  @keyframes fade-down {
    from { opacity:0; transform:translateY(-16px); }
    to   { opacity:1; transform:translateY(0);     }
  }
  @keyframes fade-in {
    from { opacity:0; }
    to   { opacity:1; }
  }
  @keyframes pop-up {
    from { opacity:0; transform:scale(0.82) translateY(14px); }
    to   { opacity:1; transform:scale(1)    translateY(0);    }
  }

  .btn-group .menu-btn:nth-child(1){ animation:pop-up 0.65s 0.58s cubic-bezier(.34,1.56,.64,1) both; }
  .btn-group .menu-btn:nth-child(2){ animation:pop-up 0.65s 0.72s cubic-bezier(.34,1.56,.64,1) both; }
  .btn-group .menu-btn:nth-child(3){ animation:pop-up 0.65s 0.86s cubic-bezier(.34,1.56,.64,1) both; }

  /* ══════════════ RESPONSIVE ══════════════ */
  @media(max-width:480px){
    .logo-ring { width:224px; height:224px; }
    .logo-ring img { width:198px; height:198px; }
    .page { padding:2rem 1.1rem 2.5rem; }
    .quote-card { margin-bottom:1.8rem; }
  }
</style>

<script>
// Color stops as a flat ordered list: [frame, hex] pairs
// Each color smoothly transitions to the next using cubic easing
const colorStops = [
  [0,   '#40654a'],
  [9,   '#d6b027'],
  [18,  '#903e62'],
  [22,  '#ed9e71'],
  [27,  '#258fa2'],
  [30,  '#bd444c'],
  [37,  '#cf8404'],
  [42,  '#374ca6'],
  [56,  '#858bd8'],
  [65,  '#937573'],
  [70,  '#f8d06c'],
  [77,  '#a273a2'],
  [82,  '#70af81'],
  [88,  '#7b98bd'],
  [96,  '#eb8a18'],
  [101, '#006484'],
  [107, '#8f2b58'],
  [119, '#bd642b'],
  [129, '#7d92e6'],
  [137, '#d4ac75'],
  [141, '#db4c61'],
  [150, '#fdbd50'],
];

// Loop: append start color at end so it wraps back smoothly
const totalFrames = colorStops[colorStops.length - 1][0] + 20;
const loopedStops = [...colorStops, [totalFrames, colorStops[0][1]]];

function hexToRgb(h) {
  const r = parseInt(h.slice(1, 3), 16);
  const g = parseInt(h.slice(3, 5), 16);
  const b = parseInt(h.slice(5, 7), 16);
  return [r, g, b];
}

// Smoothstep easing: eliminates the linear "snap" at keyframe boundaries
function smoothstep(t) {
  return t * t * (3 - 2 * t);
}

// Catmull-Rom-inspired: blend using adjacent stops for extra continuity
function getBgColorSmooth(time) {
  const f = time % totalFrames;

  // Find surrounding stops
  let i = 0;
  for (let k = 0; k < loopedStops.length - 1; k++) {
    if (f >= loopedStops[k][0] && f < loopedStops[k + 1][0]) {
      i = k;
      break;
    }
  }

  const [f0, c0] = loopedStops[i];
  const [f1, c1] = loopedStops[i + 1];

  // Raw t within this segment
  const rawT = (f - f0) / (f1 - f0);

  // Apply smoothstep so transitions ease in and out — no sudden jumps
  const t = smoothstep(Math.max(0, Math.min(1, rawT)));

  const [r0, g0, b0] = hexToRgb(c0);
  const [r1, g1, b1] = hexToRgb(c1);

  return `rgb(${Math.round(r0 + (r1 - r0) * t)}, ${Math.round(g0 + (g1 - g0) * t)}, ${Math.round(b0 + (b1 - b0) * t)})`;
}

function getWaveColor(time, offset) {
  return getBgColorSmooth(time + offset);
}

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

resize();
window.addEventListener('resize', resize);

// Six waves spread evenly across the full width
const waves = [
  { speed: 0.0030, amp: 28, xFrac: 0.15, offset:  9, phase: 0.0  },
  { speed: 0.0045, amp: 22, xFrac: 0.30, offset: 25, phase: 2.1  },
  { speed: 0.0025, amp: 34, xFrac: 0.45, offset: 42, phase: 4.2  },
  { speed: 0.0050, amp: 20, xFrac: 0.60, offset: 60, phase: 1.0  },
  { speed: 0.0035, amp: 30, xFrac: 0.75, offset: 77, phase: 3.1  },
  { speed: 0.0040, amp: 24, xFrac: 0.90, offset: 94, phase: 5.2  },
];

let t = 0;

function drawWave(wave, time) {
  const W = canvas.width;
  const H = canvas.height;

  const x0 = wave.xFrac * W;
  const color = getWaveColor(time, wave.offset);

  ctx.beginPath();

  const segments = 140;

  for (let i = 0; i <= segments; i++) {
    const y = (i / segments) * H;

    // Wave edge wiggles horizontally as y progresses downward
    const x = x0
      + Math.sin(y * 0.006 + t * wave.speed * 100 + wave.phase) * wave.amp
      + Math.sin(y * 0.012 + t * wave.speed * 60  + wave.phase * 1.5) * (wave.amp * 0.4);

    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }

  // Close to the left edge so each wave fills leftward
  ctx.lineTo(0, H);
  ctx.lineTo(0, 0);
  ctx.closePath();

  ctx.fillStyle = color;
  ctx.fill();
}

function animate(ts) {
  t = ts * 0.001;

  // Continuous fractional frame time — avoids integer snapping which caused flickers
  const frameTime = (t * 3) % totalFrames;

  const W = canvas.width;
  const H = canvas.height;

  ctx.clearRect(0, 0, W, H);

  const bg = getBgColorSmooth(frameTime);
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Draw left-to-right so rightmost wave paints on top
  [...waves]
    .sort((a, b) => b.xFrac - a.xFrac)
    .forEach(w => drawWave(w, frameTime));

  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>

<script>
/* ════════════════════════════════════════════════
   Vibrant atom / particle network — bright theme
   ════════════════════════════════════════════════ */
(function(){
  const canvas = document.getElementById('bg-canvas');
  const ctx    = canvas.getContext('2d');

  const PALETTE = [
    '#d6b027','#ed9e71','#258fa2','#bd444c',
    '#374ca6','#858bd8','#f8d06c','#a273a2',
    '#70af81','#7b98bd','#eb8a18','#8f2b58',
    '#7d92e6','#db4c61','#40654a','#cf8404',
    '#903e62','#d4ac75','#006484'
  ];

  const COUNT     = 68;
  const LINK_DIST = 148;

  let W, H, nodes = [];

  function resize(){
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function rnd(a,b){ return Math.random()*(b-a)+a; }

  function mkNode(){
    return {
      x: rnd(0,W), y: rnd(0,H),
      vx: rnd(-0.3,0.3), vy: rnd(-0.3,0.3),
      r: rnd(3.2,6.8),
      col: PALETTE[Math.floor(Math.random()*PALETTE.length)],
      a: rnd(0.58,0.88),
      phase: rnd(0,Math.PI*2),
      ps: rnd(0.012,0.026),
    };
  }

  function ha(hex,alpha){
    return hex + Math.round(alpha*255).toString(16).padStart(2,'0');
  }

  function draw(){
    ctx.clearRect(0,0,W,H);

    /* Links */
    for(let i=0;i<nodes.length;i++){
      for(let j=i+1;j<nodes.length;j++){
        const a=nodes[i],b=nodes[j];
        const dx=a.x-b.x,dy=a.y-b.y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<LINK_DIST){
          const t=1-d/LINK_DIST;
          const g=ctx.createLinearGradient(a.x,a.y,b.x,b.y);
          g.addColorStop(0,ha(a.col,t*0.42));
          g.addColorStop(1,ha(b.col,t*0.42));
          ctx.beginPath();
          ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);
          ctx.strokeStyle=g;
          ctx.lineWidth=t*2.2;
          ctx.stroke();
        }
      }
    }

    /* Nodes */
    nodes.forEach(n=>{
      n.phase+=n.ps;
      const r=n.r+Math.sin(n.phase)*1.3;

      /* Soft halo */
      const glow=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,r*5.5);
      glow.addColorStop(0,ha(n.col,0.22));
      glow.addColorStop(1,'rgba(255,255,255,0)');
      ctx.beginPath();ctx.arc(n.x,n.y,r*5.5,0,Math.PI*2);
      ctx.fillStyle=glow;ctx.fill();

      /* Main dot */
      ctx.beginPath();ctx.arc(n.x,n.y,r,0,Math.PI*2);
      ctx.fillStyle=ha(n.col,n.a);ctx.fill();

      /* Specular highlight */
      ctx.beginPath();ctx.arc(n.x-r*0.27,n.y-r*0.27,r*0.36,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.58)';ctx.fill();
    });
  }

  function update(){
    nodes.forEach(n=>{
      n.x+=n.vx;n.y+=n.vy;
      if(n.x<-20)n.x=W+20;if(n.x>W+20)n.x=-20;
      if(n.y<-20)n.y=H+20;if(n.y>H+20)n.y=-20;
    });
  }

  let mx=-9999,my=-9999;
  window.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
  window.addEventListener('touchmove',e=>{
    mx=e.touches[0].clientX;my=e.touches[0].clientY;
  },{passive:true});

  function repel(){
    nodes.forEach(n=>{
      const dx=n.x-mx,dy=n.y-my;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<95){
        const f=(95-d)/95*0.46;
        n.vx+=(dx/d)*f;n.vy+=(dy/d)*f;
        const s=Math.sqrt(n.vx*n.vx+n.vy*n.vy);
        if(s>1.4){n.vx=n.vx/s*1.4;n.vy=n.vy/s*1.4;}
      }
    });
  }

  function loop(){repel();update();draw();requestAnimationFrame(loop);}

  window.addEventListener('resize',resize);
  resize();
  nodes=Array.from({length:COUNT},mkNode);
  loop();
})();

/* ════════ Navigation ════════ */
function handleNav(page){
  /* Replace with: window.location.href = page + '.html'; */
  const labels={devotional:'Devotional',discipleship:'Discipleship',game:'Game'};
  alert('Opening '+labels[page]+' Instructions…');
}
</script>
